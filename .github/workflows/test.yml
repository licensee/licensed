name: Test

on: pull_request

permissions:
  contents: read

jobs:
  bower:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 18
      - name: Install Bower
        run: npm install -g bower
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          bundler-cache: true
      - name: Set up fixtures
        run: script/source-setup/bower
      - name: Run tests
        run: script/test bower

  bundler:
    runs-on: ubuntu-latest
    needs: core
    strategy:
      matrix:
        bundler: ["2.4", "2.5", "2.6", "4.0"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          bundler: ${{ matrix.bundler }}
          bundler-cache: true
      - name: Set up fixtures
        run: script/source-setup/bundler
      - name: Run tests
        run: script/test bundler

  cabal:
    runs-on: ubuntu-latest
    needs: core
    strategy:
      matrix:
        ghc: ["9.0", "9.2", "9.4"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          bundler-cache: true
      - name: Setup Haskell
        uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2.11.0
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: ${{ matrix.cabal }}
      - name: cache cabal dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
          key: ${{ runner.os }}-cabal-${{ matrix.ghc }}-${{ hashFiles('**/app.cabal') }}
          restore-keys: |
            ${{ runner.os }}-cabal-
      - name: Set up fixtures
        run: script/source-setup/cabal
      - name: Run tests
        run: script/test cabal

  cargo:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          bundler-cache: true
      - name: Setup Rust toolchain
        run: rustup default stable
      - name: cache cargo dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Set up fixtures
        run: script/source-setup/cargo
      - name: Run tests
        run: script/test cargo

  cocoapods:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          bundler-cache: true
      - name: Set up fixtures
        run: script/source-setup/cocoapods
      - name: Run tests
        run: script/test cocoapods

  composer:
    runs-on: ubuntu-latest
    needs: core
    strategy:
      matrix:
        php: ["7.4", "8.0"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup php
        uses: nanasess/setup-php@7a25214b64e1e1ad30e35e86a8a11e5078f453e5 # v4.3.0
        with:
          php-version: ${{ matrix.php }}
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          bundler-cache: true
      - name: Set up fixtures
        run: script/source-setup/composer
      - name: Run tests
        run: script/test composer

  core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Bump licensed.gemspec minimum Ruby version when removing old versions from this matrix.
        ruby: ["3.3", "3.4", "4.0"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{matrix.ruby}}
          bundler-cache: true
      - name: Build and lint
        run: bundle exec rake rubocop build
      - name: Core functionality tests
        run: script/test core

  dep:
    runs-on: ubuntu-latest
    needs: core
    strategy:
      matrix:
        go: ["1.17.x", "1.18.x", "1.19.x"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          bundler-cache: true

      - name: Set up go dep
        run: curl https://raw.githubusercontent.com/golang/dep/master/install.sh | sh
      - name: Set up fixtures
        run: script/source-setup/dep
      - name: Run tests
        run: script/test dep

  go:
    runs-on: ubuntu-latest
    needs: core
    strategy:
      matrix:
        go: ["1.17.x", "1.18.x", "1.19.x"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
          cache: true
          cache-dependency-path: test/fixtures/go/src/test/go.sum
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          bundler-cache: true
      - name: Set up fixtures
        run: script/source-setup/go
      - name: Run tests
        run: script/test go

