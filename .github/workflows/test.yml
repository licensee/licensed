  manifest:
    runs-on: ubuntu-latest
    needs: core
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          bundler-cache: true
      - name: Run tests
        run: script/test manifest

  mix:
    runs-on: ubuntu-latest
    needs: core
    strategy:
      matrix:
        otp: [24.x, 25.x]
        elixir: [1.13.x, 1.14.x]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: ${{matrix.otp}}
          elixir-version: ${{matrix.elixir}}
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          bundler-cache: true
      - name: Set up fixtures
        run: script/source-setup/mix
      - name: Run tests
        run: script/test mix

  npm:
    runs-on: ubuntu-latest
    needs: core
    strategy:
      matrix:
        node_version: [14, 16, 18]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm
          cache-dependency-path: test/fixtures/npm/package-lock.json
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          bundler-cache: true
      - name: Set up fixtures
        run: script/source-setup/npm
      - name: Run tests
        run: script/test npm

  nuget:
    runs-on: ubuntu-latest
    needs: core
    strategy:
      matrix:
        dotnet: ["8.x", "10.x"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup dotnet
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: ${{ matrix.dotnet }}
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          bundler-cache: true
      - name: Set up fixtures
        run: script/source-setup/nuget
      - name: Run tests
        run: script/test nuget

  pip:
    runs-on: ubuntu-latest
    needs: core
    strategy:
      matrix:
        python: ["3.8", "3.9", "3.10"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
          architecture: x64
          cache: pip
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          bundler-cache: true
      - name: Install virtualenv
        run: pip install virtualenv
      - name: Set up fixtures
        run: script/source-setup/pip
      - name: Run tests
        run: script/test pip

  pipenv:
    runs-on: ubuntu-latest
    needs: core
    strategy:
      matrix:
        # TODO: re-add 3.x when possible to get it passing.
        # python: ["3.8", "3.10", "3.x"]
        python: ["3.8", "3.10"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
          architecture: x64
          cache: pipenv
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          bundler-cache: true
      - name: Install pipenv
        run: pip install pipenv
      - name: Set up fixtures
        run: script/source-setup/pipenv
      - name: Run tests
        run: script/test pipenv

  pnpm:
    runs-on: ubuntu-latest
    needs: core
    strategy:
      matrix:
        pnpm_version: [7, 9]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm
        id: pnpm-install
        with:
          version: ${{ matrix.pnpm_version }}
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          bundler-cache: true
      - name: Set up fixtures
        run: script/source-setup/pnpm
      - name: Run tests
        run: script/test pnpm

  # TODO: restore swift tests when possible to get them passing.
  # swift:
  #   runs-on: ubuntu-latest
  #   needs: core
  #   strategy:
  #     matrix:
  #       swift: [ "5.7", "5.6" ]
  #   steps:
  #   - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
  #   - name: Setup Swift
